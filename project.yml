name: GMac
options:
  bundleIdPrefix: fr.agence810
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  swift: "6.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic

targets:
  GMac:
    type: application
    platform: macOS
    sources:
      - path: GMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.agence810.GMac
        INFOPLIST_FILE: GMac/Resources/Info.plist
    preBuildScripts:
      - script: |
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          if which swiftlint > /dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed"
          fi
        name: SwiftLint

  GMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GMacTests
    dependencies:
      - target: GMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.agence810.GMacTests
        GENERATE_INFOPLIST_FILE: YES
