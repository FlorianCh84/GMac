disabled_rules:
  - trailing_whitespace
  - todo
  - multiple_closures_with_trailing_closure
  - statement_position
  - implicit_optional_initialization
  - cyclomatic_complexity
  - blanket_disable_command
  - unused_closure_parameter
  - is_disjoint
  - nesting
  - type_name
  - large_tuple
  - trailing_comma
  - comma
  - colon
  - type_body_length

opt_in_rules:
  - force_unwrapping

force_unwrapping: error

line_length:
  warning: 225
  error: 300
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - vm
    - db
    - ok
    - qp
    - a
    - b
    - c
    - d
    - e
    - f
    - g
    - h
    - i
    - j
    - k
    - l
    - m
    - n
    - o
    - p
    - q
    - r
    - s
    - t
    - u
    - v
    - w
    - x
    - y
    - z

excluded:
  - .build
  - DerivedData
  - GMacTests
  - scripts
